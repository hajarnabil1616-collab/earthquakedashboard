
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans); color: var(--color-text-primary); }
  .dash { padding: 1rem 0; }
  .title-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; flex-wrap: wrap; gap: 8px; }
  .dash-title { font-size: 18px; font-weight: 500; }
  .live-badge { font-size: 11px; background: var(--color-background-danger); color: var(--color-text-danger); padding: 3px 10px; border-radius: 99px; display: flex; align-items: center; gap: 5px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--color-text-danger); animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  .tabs { display: flex; gap: 8px; margin-bottom: 1rem; }
  .tab { font-size: 13px; padding: 5px 14px; border-radius: 99px; border: 0.5px solid var(--color-border-secondary); background: transparent; color: var(--color-text-secondary); cursor: pointer; transition: all .15s; }
  .tab.active { background: var(--color-text-primary); color: var(--color-background-primary); border-color: transparent; }
  .kpi-grid { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 10px; margin-bottom: 1rem; }
  .kpi { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 12px 14px; }
  .kpi-label { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 4px; }
  .kpi-value { font-size: 22px; font-weight: 500; }
  .kpi-sub { font-size: 11px; color: var(--color-text-tertiary); margin-top: 2px; }
  .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1rem; }
  .chart-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 14px; }
  .chart-title { font-size: 13px; font-weight: 500; margin-bottom: 10px; color: var(--color-text-secondary); }
  .chart-wrap { position: relative; width: 100%; height: 180px; }
  .table-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 0; overflow: hidden; margin-bottom: 1rem; }
  .table-head { display: grid; grid-template-columns: 80px 1fr 90px 100px; gap: 8px; padding: 8px 14px; background: var(--color-background-secondary); font-size: 11px; font-weight: 500; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: .04em; }
  .table-row { display: grid; grid-template-columns: 80px 1fr 90px 100px; gap: 8px; padding: 9px 14px; border-top: 0.5px solid var(--color-border-tertiary); font-size: 13px; align-items: center; transition: background .1s; }
  .table-row:hover { background: var(--color-background-secondary); }
  .mag-badge { font-size: 12px; font-weight: 500; padding: 2px 8px; border-radius: 6px; display: inline-block; text-align: center; }
  .mag-minor { background: #EAF3DE; color: #3B6D11; }
  .mag-light { background: #FAEEDA; color: #854F0B; }
  .mag-mod   { background: #FAECE7; color: #993C1D; }
  .mag-strong{ background: #FCEBEB; color: #A32D2D; }
  .place-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--color-text-primary); }
  .depth-pill { font-size: 11px; padding: 2px 7px; border-radius: 99px; background: var(--color-background-secondary); color: var(--color-text-secondary); display: inline-block; }
  .time-text { font-size: 11px; color: var(--color-text-tertiary); }
  .filter-row { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; flex-wrap: wrap; }
  .filter-label { font-size: 12px; color: var(--color-text-secondary); }
  select { font-size: 12px; padding: 4px 8px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); cursor: pointer; }
  .loading { display: flex; align-items: center; justify-content: center; height: 200px; color: var(--color-text-secondary); font-size: 14px; }
  .err { color: var(--color-text-danger); font-size: 13px; padding: 1rem; }
  @media (max-width: 520px) { .kpi-grid { grid-template-columns: repeat(2, 1fr); } .charts-row { grid-template-columns: 1fr; } .table-head, .table-row { grid-template-columns: 60px 1fr 70px; } .table-head > *:last-child, .table-row > *:last-child { display: none; } }
  .new-marker { animation: bounce 2s ease-in-out; }
  @keyframes bounce { 0%, 20%, 50%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-10px); } 60% { transform: translateY(-5px); } }
</style>

<div class="container-fluid py-4">
  <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 11">
    <div id="newEventToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
      <div class="toast-header">
        <strong class="me-auto">New Earthquakes</strong>
        <small>just now</small>
        <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
      </div>
      <div class="toast-body" id="toastBody">
        New earthquake events detected!
      </div>
    </div>
  </div>
  <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap">
    <h1 class="h4 mb-0">Earthquake Dashboard</h1>
    <span class="badge bg-danger d-flex align-items-center gap-1"><span class="spinner-border spinner-border-sm" role="status"></span>Live USGS data</span>
  </div>
  <ul class="nav nav-tabs mb-3" id="rangeTabs">
    <li class="nav-item">
      <button class="nav-link active" onclick="setRange('day',this)">Past 24h</button>
    </li>
    <li class="nav-item">
      <button class="nav-link" onclick="setRange('week',this)">Past 7 days</button>
    </li>
    <li class="nav-item">
      <button class="nav-link" onclick="setRange('month',this)">Past 30 days</button>
    </li>
  </ul>
  <div id="content"><div class="d-flex justify-content-center align-items-center" style="height: 200px;"><div class="spinner-border text-secondary" role="status"><span class="visually-hidden">Loading...</span></div><span class="ms-2 text-muted">Loading earthquake data…</span></div></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
let allEqs = [], currentRange = 'day', magFilter = '0', countryFilter = 'all', yearFilter = 'all', chartBar, chartPie, map, markers, lastUpdateTime = 0, newEventIds = [], allCountries = [], allYears = [];

const URLS = {
  day:   'https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_day.geojson',
  week:  'https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_week.geojson',
  month: 'https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_month.geojson'
};

function magClass(m) {
  if (m < 2) return 'bg-success text-white';
  if (m < 4) return 'bg-warning text-dark';
  if (m < 6) return 'bg-danger text-white';
  return 'bg-dark text-white';
}
function magLabel(m) {
  if (m < 2) return 'Minor';
  if (m < 4) return 'Light';
  if (m < 6) return 'Moderate';
  return 'Strong+';
}
function timeAgo(ts) {
  const s = (Date.now() - ts) / 1000;
  if (s < 60) return Math.round(s)+'s ago';
  if (s < 3600) return Math.round(s/60)+'m ago';
  if (s < 86400) return Math.round(s/3600)+'h ago';
  return Math.round(s/86400)+'d ago';
}
function setRange(r, btn) {
  currentRange = r;
  countryFilter = 'all';
  yearFilter = 'all';
  document.querySelectorAll('#rangeTabs .nav-link').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  loadData();
}

async function loadData() {
  document.getElementById('content').innerHTML = '<div class="d-flex justify-content-center align-items-center" style="height: 200px;"><div class="spinner-border text-secondary" role="status"><span class="visually-hidden">Loading...</span></div><span class="ms-2 text-muted">Loading…</span></div>';
  try {
    const r = await fetch(URLS[currentRange]);
    const d = await r.json();
    allEqs = d.features.filter(f => f.properties.mag !== null);
    // Compute countries and years
    const countries = new Set();
    const years = new Set();
    allEqs.forEach(f => {
      const place = f.properties.place || '';
      const country = place.split(',').pop().trim() || 'Unknown';
      countries.add(country);
      const year = new Date(f.properties.time).getFullYear();
      years.add(year);
    });
    allCountries = Array.from(countries).sort();
    allYears = Array.from(years).sort((a,b)=>b-a);
    render();
  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="alert alert-danger">Could not load USGS data. Check network settings.</div>';
  }
}

function render() {
  const minMag = parseFloat(magFilter);
  const eqs = allEqs.filter(f => {
    const magOk = f.properties.mag >= minMag;
    const place = f.properties.place || '';
    const country = place.split(',').pop().trim() || 'Unknown';
    const countryOk = countryFilter === 'all' || country === countryFilter;
    const year = new Date(f.properties.time).getFullYear();
    const yearOk = yearFilter === 'all' || year == yearFilter;
    return magOk && countryOk && yearOk;
  });

  const maxMag = eqs.length ? Math.max(...eqs.map(f=>f.properties.mag)) : 0;
  const avgMag = eqs.length ? (eqs.reduce((a,f)=>a+f.properties.mag,0)/eqs.length) : 0;
  const significant = eqs.filter(f=>f.properties.mag>=5).length;
  const strongest = eqs.length ? eqs.reduce((a,b)=>a.properties.mag>b.properties.mag?a:b) : null;

  const buckets = {minor:0,light:0,moderate:0,strong:0};
  eqs.forEach(f=>{
    const m=f.properties.mag;
    if(m<2)buckets.minor++;
    else if(m<4)buckets.light++;
    else if(m<6)buckets.moderate++;
    else buckets.strong++;
  });

  // Build hourly/daily histogram
  const now = Date.now();
  let histLabels=[], histData=[];
  if(currentRange==='day'){
    for(let i=23;i>=0;i--){histLabels.push(i+'h');histData.push(0);}
    eqs.forEach(f=>{const h=Math.floor((now-f.properties.time)/3600000);if(h<24)histData[23-h]++;});
  } else if(currentRange==='week'){
    for(let i=6;i>=0;i--){const d=new Date(now-i*86400000);histLabels.push(d.toLocaleDateString('en',{weekday:'short'}));histData.push(0);}
    eqs.forEach(f=>{const d=Math.floor((now-f.properties.time)/86400000);if(d<7)histData[6-d]++;});
  } else {
    for(let i=29;i>=0;i--){histLabels.push((29-i+1)+'');histData.push(0);}
    eqs.forEach(f=>{const d=Math.floor((now-f.properties.time)/86400000);if(d<30)histData[29-d]++;});
  }

  const top = [...eqs].sort((a,b)=>b.properties.mag-a.properties.mag).slice(0,10);

  document.getElementById('content').innerHTML = `
    <div class="d-flex gap-2 align-items-center mb-3 flex-wrap">
      <label class="form-label mb-0">Min magnitude:</label>
      <select class="form-select form-select-sm" onchange="magFilter=this.value;render()">
        <option value="0" ${magFilter==='0'?'selected':''}>All</option>
        <option value="1" ${magFilter==='1'?'selected':''}>≥ 1.0</option>
        <option value="2" ${magFilter==='2'?'selected':''}>≥ 2.0</option>
        <option value="3" ${magFilter==='3'?'selected':''}>≥ 3.0</option>
        <option value="4" ${magFilter==='4'?'selected':''}>≥ 4.0</option>
        <option value="5" ${magFilter==='5'?'selected':''}>≥ 5.0</option>
      </select>
      <label class="form-label mb-0">Country:</label>
      <select class="form-select form-select-sm" onchange="countryFilter=this.value;render()">
        <option value="all" ${countryFilter==='all'?'selected':''}>All countries</option>
        ${allCountries.map(c => `<option value="${c}" ${countryFilter===c?'selected':''}>${c}</option>`).join('')}
      </select>
      <label class="form-label mb-0">Year:</label>
      <select class="form-select form-select-sm" onchange="yearFilter=this.value;render()">
        <option value="all" ${yearFilter==='all'?'selected':''}>All years</option>
        ${allYears.map(y => `<option value="${y}" ${yearFilter==y?'selected':''}>${y}</option>`).join('')}
      </select>
      <span class="ms-auto text-muted">${eqs.length.toLocaleString()} events</span>
    </div>
    <div class="row g-2 mb-3">
      <div class="col-md-3"><div class="card h-100"><div class="card-body text-center"><small class="text-muted">Total events</small><div class="display-6 fw-bold">${eqs.length.toLocaleString()}</div><small class="text-muted">${currentRange==='day'?'last 24 hours':currentRange==='week'?'last 7 days':'last 30 days'}</small></div></div></div>
      <div class="col-md-3"><div class="card h-100"><div class="card-body text-center"><small class="text-muted">Strongest</small><div class="display-6 fw-bold">${maxMag.toFixed(1)}</div><small class="text-muted">${strongest?strongest.properties.place?.split(',').pop()?.trim()||'Unknown':'–'}</small></div></div></div>
      <div class="col-md-3"><div class="card h-100"><div class="card-body text-center"><small class="text-muted">Avg magnitude</small><div class="display-6 fw-bold">${avgMag.toFixed(2)}</div><small class="text-muted">all filtered events</small></div></div></div>
      <div class="col-md-3"><div class="card h-100"><div class="card-body text-center"><small class="text-muted">M5.0+ events</small><div class="display-6 fw-bold">${significant}</div><small class="text-muted">significant quakes</small></div></div></div>
    </div>
    <div class="row g-3 mb-3">
      <div class="col-md-6"><div class="card"><div class="card-header">Events over time</div><div class="card-body"><div class="chart-wrap"><canvas id="barChart"></canvas></div></div></div></div>
      <div class="col-md-6"><div class="card"><div class="card-header">By magnitude class</div><div class="card-body"><div class="chart-wrap"><canvas id="pieChart"></canvas></div></div></div></div>
    </div>
    <div class="row mb-3"><div class="col-12"><div class="card"><div class="card-header">Earthquake Locations</div><div class="card-body"><div id="map" style="height: 400px;"></div></div></div></div></div>
    <h5 class="mb-3 text-muted">Top 10 recent earthquakes</h5>
    <div class="table-responsive">
      <table class="table table-striped table-hover">
        <thead class="table-light">
          <tr><th>Magnitude</th><th>Location</th><th>Depth</th><th>Time</th></tr>
        </thead>
        <tbody>
          ${top.map(f=>`<tr>
            <td><span class="badge ${magClass(f.properties.mag)}">${f.properties.mag.toFixed(1)} ${magLabel(f.properties.mag)}</span></td>
            <td class="text-truncate" style="max-width: 200px;">${f.properties.place||'Unknown'}</td>
            <td><span class="badge bg-secondary">${Math.round(f.geometry.coordinates[2])} km</span></td>
            <td class="text-muted small">${timeAgo(f.properties.time)}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
  `;

  // Bar chart
  if(chartBar)chartBar.destroy();
  const isDark = matchMedia('(prefers-color-scheme: dark)').matches;
  const textColor = isDark ? '#a0a09a' : '#73726c';
  const gridColor = isDark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.07)';
  chartBar = new Chart(document.getElementById('barChart'), {
    type: 'bar',
    data: { labels: histLabels, datasets: [{ label: 'Events', data: histData, backgroundColor: '#3B8BD4', borderRadius: 3, borderSkipped: false }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
      scales: { x: { ticks: { color: textColor, font: { size: 10 }, maxRotation: 0, autoSkip: true, maxTicksLimit: 8 }, grid: { color: gridColor } }, y: { ticks: { color: textColor, font: { size: 10 } }, grid: { color: gridColor } } } }
  });

  // Pie chart
  if(chartPie)chartPie.destroy();
  chartPie = new Chart(document.getElementById('pieChart'), {
    type: 'doughnut',
    data: { labels: ['Minor (<2)', 'Light (2–4)', 'Moderate (4–6)', 'Strong (6+)'],
      datasets: [{ data: [buckets.minor,buckets.light,buckets.moderate,buckets.strong], backgroundColor: ['#639922','#EF9F27','#D85A30','#E24B4A'], borderWidth: 0, hoverOffset: 4 }] },
    options: { responsive: true, maintainAspectRatio: false, cutout: '60%',
      plugins: { legend: { display: true, position: 'bottom', labels: { color: textColor, font: { size: 11 }, boxWidth: 10, padding: 8 } } } }
  });

  // Map
  if (!map) {
    map = L.map('map').setView([20, 0], 2);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors'
    }).addTo(map);
    markers = L.layerGroup().addTo(map);
  } else {
    markers.clearLayers();
  }
  eqs.forEach(f => {
    const lat = f.geometry.coordinates[1];
    const lng = f.geometry.coordinates[0];
    const mag = f.properties.mag;
    const color = mag < 2 ? '#639922' : mag < 4 ? '#EF9F27' : mag < 6 ? '#D85A30' : '#E24B4A';
    const marker = L.circleMarker([lat, lng], {
      color: color,
      fillColor: color,
      fillOpacity: 0.8,
      radius: Math.max(3, mag * 2),
      className: newEventIds.includes(f.id) ? 'new-marker' : ''
    }).addTo(markers).bindPopup(`Magnitude: ${mag.toFixed(1)}<br>Location: ${f.properties.place || 'Unknown'}`);
  });
  if (eqs.length > 0) {
    const bounds = L.latLngBounds(eqs.map(f => [f.geometry.coordinates[1], f.geometry.coordinates[0]]));
    map.fitBounds(bounds, {padding: [20, 20]});
  }
}

function checkForUpdates() {
  fetch(URLS[currentRange])
    .then(r => r.json())
    .then(d => {
      const newFeatures = d.features.filter(f => f.properties.time > lastUpdateTime);
      if (newFeatures.length > 0) {
        allEqs.unshift(...newFeatures);
        // Update countries and years
        const countries = new Set(allCountries);
        const years = new Set(allYears);
        newFeatures.forEach(f => {
          const place = f.properties.place || '';
          const country = place.split(',').pop().trim() || 'Unknown';
          countries.add(country);
          const year = new Date(f.properties.time).getFullYear();
          years.add(year);
        });
        allCountries = Array.from(countries).sort();
        allYears = Array.from(years).sort((a,b)=>b-a);
        newEventIds = newFeatures.map(f => f.id);
        lastUpdateTime = Date.now();
        render();
        const toastEl = document.getElementById('newEventToast');
        document.getElementById('toastBody').textContent = `${newFeatures.length} new earthquake${newFeatures.length > 1 ? 's' : ''} detected!`;
        const toast = new bootstrap.Toast(toastEl);
        toast.show();
        setTimeout(() => newEventIds = [], 3000); // Clear after animation
      }
    })
    .catch(e => console.log('Update check failed:', e));
}

loadData();
setInterval(checkForUpdates, 60000); // Check for updates every minute
</script>
